server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: pet-care-iot

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pet_iot_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 萤石开放平台配置
ezviz:
  app-key: c8f4ad8220c24443bc60327cbcc06c24
  app-secret: 62d73a2f5a6f6f63593d373dc2a55796
  api-base-url: https://open.ys7.com
  token-ttl: 604800   # token有效期7天（秒）

# 宠物监测配置
pet-monitor:
  capture-interval-seconds: 300   # 每5分钟抓图一次
  abnormal-inactive-minutes: 120  # 2小时无活动视为异常

logging:
  level:
    com.petcare: debug
jwt:
  secret: "PetCareIoTSuperSecretKey2026PetCare!!!"
  expiration-ms: 86400000